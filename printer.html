<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DootToot | Live Print Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #38bdf8; --bg: #0a0a0a; --card-bg: #161616; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; }
        
        .dashboard-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        
        /* Left Side */
        .camera-box { position: relative; width: 100%; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 16/9; margin-bottom: 20px; }
        #camera-stream { width: 100%; height: 100%; object-fit: cover; }
        
        .progress-section { margin-top: auto; }
        .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .progress-percent { font-size: 3rem; font-weight: 800; letter-spacing: -2px; }
        .progress-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); transition: width 1.5s ease; }

        /* Right Side Telemetry */
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; }
        .stat-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { display: block; font-size: 0.6rem; color: #666; font-family: 'JetBrains Mono'; margin-bottom: 4px; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 800; color: white; }
        .stat-unit { font-size: 0.7rem; color: #444; margin-left: 2px; }

        /* Schedule Card */
        .schedule-card { grid-column: span 2; background: rgba(56, 189, 248, 0.05); border-color: rgba(56, 189, 248, 0.2); }
        .schedule-flex { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .schedule-item { flex: 1; text-align: center; }
        .schedule-divider { width: 1px; height: 25px; background: rgba(255,255,255,0.1); margin: 0 10px; }

        /* Image Card */
        .cover-card { grid-column: span 2; padding: 0; overflow: hidden; position: relative; min-height: 180px; background: #000; border-radius: 16px; }
        #cover-image { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .cover-label { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 6px; font-size: 0.6rem; font-family: 'JetBrains Mono'; color: var(--accent); z-index: 2; }

        .return-btn { margin-top: 20px; display: inline-flex; align-items: center; gap: 8px; color: #444; text-decoration: none; font-size: 0.7rem; font-family: 'JetBrains Mono'; transition: 0.3s; }
        .return-btn:hover { color: var(--accent); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="card">
        <div class="camera-box">
            <img id="camera-stream" src="" alt="Live Stream">
            <div style="position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 6px 14px; border-radius: 20px; font-size: 0.65rem; border: 1px solid var(--accent); font-family: 'JetBrains Mono';">
                <span style="color: var(--accent); animation: pulse 2s infinite;">●</span> LIVE_FEED
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-header">
                <div>
                    <span class="stat-label">CURRENT_STAGE</span>
                    <span id="current-stage" style="font-weight: 800; color: white;">INITIALIZING</span>
                </div>
                <div class="progress-percent"><span id="print-progress">0</span><span style="font-size: 1rem; color: var(--accent); margin-left: 2px;">%</span></div>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <h2 style="font-size: 0.7rem; font-family: 'JetBrains Mono'; color: var(--accent); margin: 0;">LIVE TELEMETRY</h2>
            <span id="sync-time" style="font-size: 0.65rem; color: #444; font-family: 'JetBrains Mono';">SYNC: --:--:--</span>
        </div>
        
        <div class="telemetry-grid">
            <div class="stat-box">
                <span class="stat-label">NOZZLE / BED</span>
                <span class="stat-value"><span id="nozzle-temp">--</span>° / <span id="bed-temp">--</span>°C</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">CHAMBER / WEIGHT</span>
                <span class="stat-value"><span id="chamber-temp">--</span>°C / <span id="print-weight">--</span><span class="stat-unit">G</span></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">LAYERS</span>
                <span class="stat-value"><span id="current-layer">--</span> / <span id="total-layers">--</span></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">STATUS</span>
                <span class="stat-value" id="current-stage-mini" style="font-size: 0.8rem;">--</span>
            </div>

            <div class="stat-box schedule-card">
                <span class="stat-label">TIME SCHEDULE</span>
                <div class="schedule-flex">
                    <div class="schedule-item">
                        <span class="stat-label" style="font-size: 0.5rem;">STARTED</span>
                        <span class="stat-value" id="start-time" style="font-size: 0.8rem;">--:--</span>
                    </div>
                    <div class="schedule-divider"></div>
                    <div class="schedule-item">
                        <span class="stat-label" style="font-size: 0.5rem;">REMAINING</span>
                        <span class="stat-value" id="print-length" style="color: var(--accent); font-size: 0.8rem;">--</span>
                    </div>
                    <div class="schedule-divider"></div>
                    <div class="schedule-item">
                        <span class="stat-label" style="font-size: 0.5rem;">EST. END</span>
                        <span class="stat-value" id="end-time" style="font-size: 0.8rem;">--:--</span>
                    </div>
                </div>
            </div>

            <div class="stat-box cover-card">
                <span class="cover-label">CURRENTLY PRINTING</span>
                <img id="cover-image" src="" alt="Cover Image">
            </div>
        </div>

        <a href="/" class="return-btn"><i class="fas fa-chevron-left"></i> RETURN_TO_HUB</a>
    </div>
</div>

<script>
    const PROXY_URL = "https://api.mandelli.dev/";
    const CAMERA_ENTITY = "camera.p2s_22e8aj5c1401485_camera";
    
    const SENSORS = {
        "sensor.p2s_22e8aj5c1401485_print_progress": "print-progress",
        "sensor.p2s_22e8aj5c1401485_nozzle_temperature": "nozzle-temp",
        "sensor.p2s_22e8aj5c1401485_bed_temperature": "bed-temp",
        "sensor.p2s_22e8aj5c1401485_chamber_temperature": "chamber-temp",
        "sensor.p2s_22e8aj5c1401485_current_layer": "current-layer",
        "sensor.p2s_22e8aj5c1401485_total_layer_count": "total-layers",
        "sensor.p2s_22e8aj5c1401485_current_stage": "current-stage",
        "sensor.p2s_22e8aj5c1401485_print_length": "print-length",
        "sensor.p2s_22e8aj5c1401485_print_weight": "print-weight",
        "sensor.p2s_22e8aj5c1401485_start_time": "start-time",
        "sensor.p2s_22e8aj5c1401485_end_time": "end-time",
        "sensor.p2s_22e8aj5c1401485_cover_image": "cover-image" // Fetched via attribute in loop
    };

    function formatTime(val) {
        const num = parseFloat(val);
        if (isNaN(num) || num === 0) return "CALC...";
        const h = Math.floor(num / 60);
        const m = Math.floor(num % 60);
        return h > 0 ? `${h}H ${m}M` : `${m}M`;
    }

    function parseTimestamp(ts) {
        if (!ts || ts === "unknown") return "--:--";
        const date = new Date(ts);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function updateDashboard() {
        try {
            // Update Camera Feed
            document.getElementById('camera-stream').src = `${PROXY_URL}${CAMERA_ENTITY}?t=${Date.now()}`;
            
            // Fetch all sensors
            const results = await Promise.all(Object.keys(SENSORS).map(id => fetch(PROXY_URL + id).then(res => res.json())));

            results.forEach((data, index) => {
                const elementId = Object.values(SENSORS)[index];
                let value = data.state;

                // Handle Image Attribute specifically
                if (elementId === 'cover-image') {
                    if (data.attributes && data.attributes.entity_picture) {
                        document.getElementById('cover-image').src = `https://ha.mandelli.dev${data.attributes.entity_picture}`;
                    }
                    return;
                }

                if (elementId === 'print-progress') {
                    const p = Math.round(parseFloat(value)) || 0;
                    document.getElementById(elementId).textContent = p;
                    document.getElementById('progress-fill').style.width = p + '%';
                } 
                else if (elementId === 'print-length') {
                    document.getElementById(elementId).textContent = formatTime(value);
                }
                else if (elementId === 'print-weight') {
                    const w = parseFloat(value);
                    document.getElementById(elementId).textContent = isNaN(w) ? "--" : w.toFixed(1);
                }
                else if (elementId === 'start-time' || elementId === 'end-time') {
                    document.getElementById(elementId).textContent = parseTimestamp(value);
                }
                else if (elementId === 'current-stage') {
                    const stage = value.toUpperCase().replace(/_/g, " ");
                    document.getElementById(elementId).textContent = stage;
                    document.getElementById('current-stage-mini').textContent = stage;
                }
                else if (elementId.includes('temp')) {
                    document.getElementById(elementId).textContent = Math.round(parseFloat(value)) || "--";
                }
                else {
                    const el = document.getElementById(elementId);
                    if (el) el.textContent = value || "--";
                }
            });

            document.getElementById('sync-time').textContent = `SYNC: ${new Date().toLocaleTimeString([], {hour12:false})}`;
        } catch (e) { console.error("Sync Error", e); }
    }

    setInterval(updateDashboard, 5000);
    updateDashboard();
</script>

</body>
</html>
