<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DootToot Dashboard | mandelli.dev</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard { width: 100%; max-width: 1000px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 span { color: var(--accent); }

        .status-badge {
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .main-progress {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .progress-bar-bg {
            background: #334155;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%; 
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transition: width 1s ease-in-out;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .label { color: var(--text-muted); }
        .value { font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>DootToot <span>Lab</span></h1>
            <div id="print-status" class="status-badge">Checking...</div>
        </header>

        <section class="main-progress">
            <div class="progress-meta">
                <span id="gcode-name">Loading file...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 15px;">
                Layer: <span id="layer-count" class="value">-- / --</span>
            </p>
        </section>

        <div class="stats-grid">
            <div class="card">
                <h3>Temperatures</h3>
                <div class="data-row"><span class="label">Nozzle</span><span id="nozzle-temp" class="value">--°C</span></div>
                <div class="data-row"><span class="label">Heat Bed</span><span id="bed-temp" class="value">--°C</span></div>
                <div class="data-row"><span class="label">Chamber</span><span id="chamber-temp" class="value">--°C</span></div>
            </div>

            <div class="card">
                <h3>Hardware</h3>
                <div class="data-row"><span class="label">Cooling Fan</span><span id="fan-speed" class="value">--%</span></div>
                <div class="data-row"><span class="label">Speed Mode</span><span id="speed-profile" class="value">Standard</span></div>
            </div>

            <div class="card">
                <h3>Material Usage</h3>
                <div class="data-row"><span class="label">Est. Weight</span><span id="print-weight" class="value">--g</span></div>
                <div class="data-row"><span class="label">Remaining Time</span><span id="time-left" class="value">--m</span></div>
            </div>
        </div>
    </div>

    <script>
        // Use your specific Cloudflare Worker URL here
        const PROXY_URL = "https://doot-toot-proxy.mandellijason.workers.dev/";

        async function updateDashboard() {
            // Mapping UI IDs to your specific Bambu P2S Serial Number sensors
            const entityMap = {
                "progress-percent": "sensor.p2s_22e8aj5c1401485_print_progress",
                "nozzle-temp": "sensor.p2s_22e8aj5c1401485_nozzle_temperature",
                "bed-temp": "sensor.p2s_22e8aj5c1401485_bed_temperature",
                "chamber-temp": "sensor.p2s_22e8aj5c1401485_chamber_temperature",
                "print-status": "sensor.p2s_22e8aj5c1401485_print_status",
                "gcode-name": "sensor.p2s_22e8aj5c1401485_gcode_filename",
                "fan-speed": "sensor.p2s_22e8aj5c1401485_cooling_fan_speed",
                "print-weight": "sensor.p2s_22e8aj5c1401485_print_weight",
                "time-left": "sensor.p2s_22e8aj5c1401485_remaining_time"
            };

            for (const [elementId, entityId] of Object.entries(entityMap)) {
                try {
                    // No Authorization header needed here! The Worker handles it.
                    const response = await fetch(PROXY_URL + entityId);
                    
                    if (response.ok) {
                        const data = await response.json();
                        const val = data.state;
                        const el = document.getElementById(elementId);

                        if (elementId === "progress-percent") {
                            el.innerText = val + "%";
                            document.getElementById('progress-fill').style.width = val + "%";
                        } else if (elementId === "gcode-name") {
                            el.innerText = val.split('/').pop() || "Idle";
                        } else {
                            el.innerText = val;
                        }

                        if (elementId.includes('temp')) el.innerText += "°C";
                    }
                } catch (err) {
                    console.error("Fetch failed for " + entityId, err);
                }
            }

            // Layer count handles two sensors separately
            try {
                const cur = await (await fetch(PROXY_URL + "sensor.p2s_22e8aj5c1401485_current_layer")).json();
                const tot = await (await fetch(PROXY_URL + "sensor.p2s_22e8aj5c1401485_total_layer_count")).json();
                document.getElementById('layer-count').innerText = `${cur.state} / ${tot.state}`;
            } catch (e) {}
        }

        // Refresh data every 30 seconds
        setInterval(updateDashboard, 30000);
        updateDashboard();
    </script>
</body>
</html>
