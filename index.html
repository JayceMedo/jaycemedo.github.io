<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandelli.Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d1117; 
            --container-bg: #161b22;
            --accent-color: #58a6ff; 
            --text-primary: #c9d1d9;
            --text-bright: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 3rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--text-bright);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .email-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: monospace;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .reverse-email {
            unicode-bidi: bidi-override;
            direction: rtl;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 4px;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .copy-btn:hover {
            color: var(--accent-color);
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .links a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
            padding: 14px;
            text-decoration: none;
            color: var(--text-bright);
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }

        .links a:hover {
            background: #30363d;
            border-color: var(--accent-color);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
        }

        i {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mandelli.Dev</h1>
    <div class="tagline">> Healthcare IT | AI | Tech</div>
    
    <div class="email-box">
        <span class="reverse-email" id="email-text">ved.illednam@nosaj</span>
        <button class="copy-btn" onclick="copyEmail()" title="Copy Email">
            <i id="copy-icon" class="far fa-copy"></i>
        </button>
    </div>

    <p>
        Welcome to my corner of the internet. <br>
        Exploring the intersection of technology and human health.
    </p>

    <div class="links">
        <a href="https://www.linkedin.com/in/jason-mandelli-898a7aa3/" target="_blank">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
        <a href="https://instagram.com/jasonmandelli" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="/pgp.asc" target="_blank">
            <i class="fas fa-key"></i> Public PGP Key
        </a>
    </div>
</div>

<script>
    function copyEmail() {
        const email = "jason@mandelli.dev";
        const icon = document.getElementById('copy-icon');
        
        navigator.clipboard.writeText(email).then(() => {
            // Change icon to checkmark
            icon.classList.remove('fa-copy', 'far');
            icon.classList.add('fa-check', 'fas');
            icon.style.color = "#3fb950"; // GitHub success green

            // Reset after 2 seconds
            setTimeout(() => {
                icon.classList.remove('fa-check', 'fas');
                icon.classList.add('fa-copy', 'far');
                icon.style.color = "";
